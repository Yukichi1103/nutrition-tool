<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>栄養管理ツール</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Hiragino Sans',sans-serif;background:#f5f7fa;color:#333;font-size:16px;min-height:100vh}

.header{background:#fff;border-bottom:2px solid #e8eaed;padding:14px 16px 0;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.header-title{font-size:20px;font-weight:800;color:#2c3e50;letter-spacing:-.5px}
.date-nav{display:flex;align-items:center;gap:8px}
.date-nav-btn{background:#f0f2f5;border:none;border-radius:6px;padding:6px 12px;cursor:pointer;font-size:16px;line-height:1;color:#555;transition:background .15s}
.date-nav-btn:hover{background:#e0e4ea}
#currentDate{padding:6px 10px;border:1.5px solid #e0e0e0;border-radius:8px;font-size:14px;color:#333;background:#fff;cursor:pointer}
.btn-today{padding:6px 12px;background:#eef4ff;border:1.5px solid #4a90d9;border-radius:6px;color:#4a90d9;font-size:13px;font-weight:600;cursor:pointer}

.nav-tabs{display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;background:#fff;scrollbar-width:none}
.nav-tabs::-webkit-scrollbar{display:none}
.nav-tab{padding:12px 14px;border:none;background:none;font-size:13px;color:#888;cursor:pointer;white-space:nowrap;border-bottom:3px solid transparent;font-weight:500;transition:all .2s;flex-shrink:0}
.nav-tab.active{color:#4a90d9;border-bottom-color:#4a90d9;font-weight:700}

.content{max-width:780px;margin:0 auto;padding:16px}

.card{background:#fff;border-radius:14px;padding:20px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.card-title{font-size:15px;font-weight:700;color:#2c3e50;margin-bottom:16px;display:flex;align-items:center;gap:6px}

.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
@media(min-width:500px){.stats-grid{grid-template-columns:repeat(4,1fr)}}
.stat-card{background:#f8f9fc;border-radius:12px;padding:14px;text-align:center;border:1px solid #eff0f3}
.stat-label{font-size:11px;color:#999;margin-bottom:4px;font-weight:600;letter-spacing:.3px}
.stat-value{font-size:24px;font-weight:800;color:#2c3e50;line-height:1.1}
.stat-unit{font-size:12px;color:#aaa;font-weight:400}
.stat-goal{font-size:11px;color:#bbb;margin-top:3px}
.stat-pct{font-size:12px;font-weight:700;margin-top:2px}
.pct-ok{color:#27ae60}.pct-warn{color:#f39c12}.pct-over{color:#e74c3c}

.progress-wrap{margin-bottom:13px}
.progress-head{display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px;color:#555}
.progress-head b{color:#2c3e50}
.progress-bar{height:11px;background:#f0f0f0;border-radius:6px;overflow:hidden}
.progress-fill{height:100%;border-radius:6px;transition:width .4s ease}
.p-cal{background:linear-gradient(90deg,#ff6b6b,#ff8e8e)}
.p-pro{background:linear-gradient(90deg,#4ecdc4,#6eddd5)}
.p-fat{background:linear-gradient(90deg,#f7b731,#fcd34d)}
.p-carb{background:linear-gradient(90deg,#a29bfe,#c4b0ff)}

.form-group{margin-bottom:12px}
.form-label{display:block;font-size:12px;font-weight:700;color:#666;margin-bottom:5px;letter-spacing:.3px}
.form-input{width:100%;padding:10px 13px;border:1.5px solid #e0e4ea;border-radius:9px;font-size:15px;color:#333;background:#fff;transition:border-color .2s;-webkit-appearance:none;appearance:none}
.form-input:focus{outline:none;border-color:#4a90d9;box-shadow:0 0 0 3px rgba(74,144,217,.1)}
select.form-input{cursor:pointer}
.form-row{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
@media(min-width:500px){.form-row-4{grid-template-columns:repeat(4,1fr)}}

.btn{padding:10px 18px;border:none;border-radius:9px;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:5px;justify-content:center}
.btn-block{width:100%}
.btn-primary{background:#4a90d9;color:#fff}
.btn-primary:hover{background:#3a7bc8;transform:translateY(-1px)}
.btn-success{background:#27ae60;color:#fff}
.btn-success:hover{background:#219150}
.btn-danger{background:#e74c3c;color:#fff;padding:5px 11px;font-size:12px}
.btn-danger:hover{background:#c0392b}
.btn-sec{background:#f0f2f5;color:#555;padding:5px 11px;font-size:12px}
.btn-sec:hover{background:#e4e6ea}

.quick-wrap{display:flex;flex-wrap:wrap;gap:8px}
.quick-btn{padding:8px 14px;border:1.5px solid #4a90d9;border-radius:20px;background:#f0f6ff;color:#4a90d9;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap}
.quick-btn:hover{background:#4a90d9;color:#fff}

.meal-item{border:1.5px solid #eff1f5;border-radius:11px;padding:13px;margin-bottom:9px;background:#fafbfd;transition:border-color .2s}
.meal-item:hover{border-color:#c9d6e8}
.meal-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:8px}
.meal-name{font-weight:700;color:#2c3e50;font-size:15px;margin-top:4px}
.meal-cat{display:inline-block;padding:3px 10px;border-radius:12px;font-size:12px;font-weight:700}
.cat-breakfast{background:#fff3e0;color:#e67e22}
.cat-lunch{background:#e8f5e9;color:#27ae60}
.cat-dinner{background:#eef0fb;color:#5c6bc0}
.cat-snack{background:#fce4ec;color:#c0392b}
.meal-actions{display:flex;gap:5px;flex-shrink:0}
.meal-nums{display:flex;gap:10px;flex-wrap:wrap;font-size:13px;color:#777}
.meal-nums span{white-space:nowrap}

.weight-big{display:flex;align-items:baseline;gap:6px}
#weightInput{width:130px;font-size:28px;font-weight:800;text-align:center;padding:8px 12px}
.weight-unit{font-size:18px;color:#aaa;font-weight:600}

.empty{text-align:center;padding:36px 20px;color:#bbb}
.empty-icon{font-size:44px;margin-bottom:10px}

.past-item{border:1.5px solid #e8eaed;border-radius:11px;padding:14px;margin-bottom:9px;cursor:pointer;transition:all .2s}
.past-item:hover{background:#f5f7fa;border-color:#4a90d9}
.past-date{font-weight:700;color:#2c3e50;margin-bottom:4px;font-size:15px}
.past-summary{font-size:13px;color:#888;line-height:1.6}

.chart-wrap{position:relative;height:240px}

.weekly-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f0f0f0;font-size:14px}
.weekly-row:last-child{border-bottom:none}
.weekly-label{color:#666}
.weekly-val{font-weight:700;color:#2c3e50}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;align-items:center;justify-content:center;padding:16px}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:18px;padding:24px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.modal-title{font-size:18px;font-weight:800;margin-bottom:20px;color:#2c3e50}
.modal-actions{display:flex;gap:10px;margin-top:20px}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#2c3e50;color:#fff;padding:12px 24px;border-radius:24px;font-size:14px;z-index:2000;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}

.tag-new{display:inline-block;background:#ff6b6b;color:#fff;font-size:10px;padding:2px 6px;border-radius:6px;margin-left:6px;font-weight:700;vertical-align:middle}

.section-note{font-size:12px;color:#aaa;margin-bottom:12px;line-height:1.5}

.hidden{display:none!important}

@media(max-width:480px){
  .content{padding:12px}
  .card{padding:15px}
  .header-top{flex-wrap:wrap;gap:8px}
}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="header-title">💪 栄養管理</div>
    <div class="date-nav">
      <button class="date-nav-btn" onclick="changeDate(-1)">◀</button>
      <input type="date" id="currentDate" onchange="onDateChange()">
      <button class="date-nav-btn" onclick="changeDate(1)">▶</button>
      <button class="btn-today" onclick="goToToday()">今日</button>
    </div>
  </div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="switchTab('today')">📋 今日</button>
    <button class="nav-tab" onclick="switchTab('past')">📅 過去</button>
    <button class="nav-tab" onclick="switchTab('weight')">📈 体重</button>
    <button class="nav-tab" onclick="switchTab('weekly')">📆 週間</button>
    <button class="nav-tab" onclick="switchTab('templates')">⭐ テンプレ</button>
    <button class="nav-tab" onclick="switchTab('goals')">🎯 目標</button>
  </div>
</div>

<!-- ===== TODAY TAB ===== -->
<div id="tab-today" class="content">

  <div class="card">
    <div class="card-title">⚖️ 今日の体重</div>
    <div class="weight-big">
      <input type="number" id="weightInput" class="form-input" step="0.1" min="0" max="300" placeholder="70.0" oninput="saveWeight()">
      <span class="weight-unit">kg</span>
    </div>
  </div>

  <div class="card">
    <div class="card-title">📊 今日の合計</div>
    <div class="stats-grid" id="todayStats"></div>
  </div>

  <div class="card">
    <div class="card-title">🎯 目標達成率</div>
    <div id="progressSection"></div>
  </div>

  <div class="card">
    <div class="card-title">⚡ クイック追加（テンプレから）</div>
    <div class="quick-wrap" id="quickBtns"></div>
  </div>

  <div class="card">
    <div class="card-title">➕ 食事を追加</div>
    <div class="form-group">
      <label class="form-label">食事区分</label>
      <select id="mealCategory" class="form-input">
        <option value="breakfast">🌅 朝食</option>
        <option value="lunch">☀️ 昼食</option>
        <option value="dinner">🌙 夕食</option>
        <option value="snack">🍪 間食</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">食品名</label>
      <input type="text" id="mealName" class="form-input" placeholder="例：鶏むね肉 100g、コンビニおにぎり">
    </div>
    <div class="form-row form-row-4">
      <div class="form-group">
        <label class="form-label">カロリー (kcal)</label>
        <input type="number" id="mealCalories" class="form-input" placeholder="200" min="0">
      </div>
      <div class="form-group">
        <label class="form-label">たんぱく質 (g)</label>
        <input type="number" id="mealProtein" class="form-input" placeholder="30" min="0" step="0.1">
      </div>
      <div class="form-group">
        <label class="form-label">脂質 (g)</label>
        <input type="number" id="mealFat" class="form-input" placeholder="5" min="0" step="0.1">
      </div>
      <div class="form-group">
        <label class="form-label">炭水化物 (g)</label>
        <input type="number" id="mealCarbs" class="form-input" placeholder="30" min="0" step="0.1">
      </div>
    </div>
    <button class="btn btn-primary btn-block" onclick="addMeal()">追加する</button>
  </div>

  <div class="card">
    <div class="card-title">🍽️ 食事一覧</div>
    <div id="mealList"></div>
  </div>

</div>

<!-- ===== PAST TAB ===== -->
<div id="tab-past" class="content hidden">
  <div class="card">
    <div class="card-title">📅 過去の記録（新しい順）</div>
    <div id="pastRecords"></div>
  </div>
</div>

<!-- ===== WEIGHT TAB ===== -->
<div id="tab-weight" class="content hidden">
  <div class="card">
    <div class="card-title">📈 体重推移（過去30日）</div>
    <div class="chart-wrap"><canvas id="weightChart"></canvas></div>
  </div>
  <div class="card">
    <div class="card-title">📋 体重データ一覧</div>
    <div id="weightList"></div>
  </div>
</div>

<!-- ===== WEEKLY TAB ===== -->
<div id="tab-weekly" class="content hidden">
  <div class="card">
    <div class="card-title">📆 週間サマリー（過去7日）</div>
    <div id="weeklyStats"></div>
  </div>
</div>

<!-- ===== TEMPLATES TAB ===== -->
<div id="tab-templates" class="content hidden">
  <div class="card">
    <div class="card-title">⭐ テンプレート食品</div>
    <p class="section-note">よく食べる食品を登録すると「クイック追加」ボタンに表示されます。ワンクリックで今日の記録に追加できます。</p>
    <div id="templateList"></div>
  </div>
  <div class="card">
    <div class="card-title">➕ テンプレートを追加</div>
    <div class="form-group">
      <label class="form-label">食品名</label>
      <input type="text" id="tmplName" class="form-input" placeholder="例：ザバスプロテイン、コンビニサラダチキン">
    </div>
    <div class="form-group">
      <label class="form-label">デフォルト食事区分</label>
      <select id="tmplCategory" class="form-input">
        <option value="breakfast">朝食</option>
        <option value="lunch">昼食</option>
        <option value="dinner">夕食</option>
        <option value="snack">間食</option>
      </select>
    </div>
    <div class="form-row form-row-4">
      <div class="form-group">
        <label class="form-label">カロリー</label>
        <input type="number" id="tmplCalories" class="form-input" placeholder="110" min="0">
      </div>
      <div class="form-group">
        <label class="form-label">たんぱく質</label>
        <input type="number" id="tmplProtein" class="form-input" placeholder="20" min="0" step="0.1">
      </div>
      <div class="form-group">
        <label class="form-label">脂質</label>
        <input type="number" id="tmplFat" class="form-input" placeholder="2" min="0" step="0.1">
      </div>
      <div class="form-group">
        <label class="form-label">炭水化物</label>
        <input type="number" id="tmplCarbs" class="form-input" placeholder="5" min="0" step="0.1">
      </div>
    </div>
    <button class="btn btn-primary btn-block" onclick="addTemplate()">テンプレートを保存</button>
  </div>
</div>

<!-- ===== GOALS TAB ===== -->
<div id="tab-goals" class="content hidden">
  <div class="card">
    <div class="card-title">🎯 1日の目標値を設定</div>
    <p class="section-note">筋トレ・増量を目的とした目標の目安：カロリー2500〜3000、たんぱく質150〜180g、脂質60〜80g、炭水化物300〜400g</p>
    <div class="form-group">
      <label class="form-label">目標カロリー (kcal)</label>
      <input type="number" id="goalCalories" class="form-input" placeholder="2500" min="0">
    </div>
    <div class="form-group">
      <label class="form-label">目標たんぱく質 (g)</label>
      <input type="number" id="goalProtein" class="form-input" placeholder="160" min="0" step="0.1">
    </div>
    <div class="form-group">
      <label class="form-label">目標脂質 (g)</label>
      <input type="number" id="goalFat" class="form-input" placeholder="70" min="0" step="0.1">
    </div>
    <div class="form-group">
      <label class="form-label">目標炭水化物 (g)</label>
      <input type="number" id="goalCarbs" class="form-input" placeholder="300" min="0" step="0.1">
    </div>
    <button class="btn btn-primary btn-block" onclick="saveGoals()">目標を保存する</button>
  </div>
</div>

<!-- ===== EDIT MODAL ===== -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <div class="modal-title">✏️ 食事を編集</div>
    <input type="hidden" id="editId">
    <div class="form-group">
      <label class="form-label">食事区分</label>
      <select id="editCategory" class="form-input">
        <option value="breakfast">🌅 朝食</option>
        <option value="lunch">☀️ 昼食</option>
        <option value="dinner">🌙 夕食</option>
        <option value="snack">🍪 間食</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">食品名</label>
      <input type="text" id="editName" class="form-input">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">カロリー (kcal)</label>
        <input type="number" id="editCalories" class="form-input" min="0">
      </div>
      <div class="form-group">
        <label class="form-label">たんぱく質 (g)</label>
        <input type="number" id="editProtein" class="form-input" min="0" step="0.1">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">脂質 (g)</label>
        <input type="number" id="editFat" class="form-input" min="0" step="0.1">
      </div>
      <div class="form-group">
        <label class="form-label">炭水化物 (g)</label>
        <input type="number" id="editCarbs" class="form-input" min="0" step="0.1">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-primary" style="flex:1" onclick="saveEdit()">保存</button>
      <button class="btn btn-sec" style="flex:1;padding:10px" onclick="closeModal()">キャンセル</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// =====================
// STORAGE
// =====================
const K = { REC: 'nt_records', GOALS: 'nt_goals', TMPL: 'nt_templates' };

function getRecs() { return JSON.parse(localStorage.getItem(K.REC) || '{}'); }
function getRec(d) { return getRecs()[d] || { weight: null, meals: [] }; }
function saveRec(d, data) {
  const r = getRecs(); r[d] = data;
  localStorage.setItem(K.REC, JSON.stringify(r));
}
function getGoals() {
  return Object.assign({ calories:2500, protein:160, fat:70, carbs:300 },
    JSON.parse(localStorage.getItem(K.GOALS) || '{}'));
}
function getTmpl() {
  const s = localStorage.getItem(K.TMPL);
  if (s) return JSON.parse(s);
  return [
    { id:'t1', name:'ホエイプロテイン 1杯', category:'snack', calories:110, protein:20, fat:1.5, carbs:6 },
    { id:'t2', name:'鶏むね肉 100g', category:'lunch', calories:108, protein:23, fat:1.5, carbs:0 },
    { id:'t3', name:'ご飯 200g', category:'lunch', calories:336, protein:5, fat:0.5, carbs:74 },
    { id:'t4', name:'卵 1個', category:'breakfast', calories:76, protein:6.2, fat:5, carbs:0.2 },
    { id:'t5', name:'バナナ 1本', category:'snack', calories:86, protein:1, fat:0.2, carbs:22 },
    { id:'t6', name:'サラダチキン 1個', category:'lunch', calories:113, protein:24, fat:1.5, carbs:0 },
    { id:'t7', name:'食パン 1枚', category:'breakfast', calories:132, protein:4.6, fat:2, carbs:24 },
  ];
}
function saveTmpl(t) { localStorage.setItem(K.TMPL, JSON.stringify(t)); }

// =====================
// STATE
// =====================
let curDate = todayStr();
let curTab = 'today';
let wChart = null;

function todayStr() { return new Date().toISOString().split('T')[0]; }

function fmtDate(ds) {
  const d = new Date(ds + 'T00:00:00');
  const days = ['日','月','火','水','木','金','土'];
  return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${days[d.getDay()]}）`;
}

function fmtShort(ds) {
  const d = new Date(ds + 'T00:00:00');
  const days = ['日','月','火','水','木','金','土'];
  return `${d.getMonth()+1}/${d.getDate()}（${days[d.getDay()]}）`;
}

// =====================
// UTILS
// =====================
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 2200);
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

function catLabel(c) { return {breakfast:'朝食',lunch:'昼食',dinner:'夕食',snack:'間食'}[c] || c; }

function totals(meals) {
  return (meals||[]).reduce((a,m) => ({
    calories: a.calories + (+m.calories||0),
    protein:  a.protein  + (+m.protein ||0),
    fat:      a.fat      + (+m.fat     ||0),
    carbs:    a.carbs    + (+m.carbs   ||0),
  }), { calories:0, protein:0, fat:0, carbs:0 });
}

function pct(v, g) { return g ? Math.min(Math.round(v/g*100), 999) : 0; }

function pctClass(p) {
  if (p >= 100) return 'pct-over';
  if (p >= 80) return 'pct-ok';
  return 'pct-warn';
}

// =====================
// DATE NAV
// =====================
function changeDate(delta) {
  const d = new Date(curDate + 'T00:00:00');
  d.setDate(d.getDate() + delta);
  curDate = d.toISOString().split('T')[0];
  document.getElementById('currentDate').value = curDate;
  renderTab();
}

function onDateChange() {
  curDate = document.getElementById('currentDate').value;
  renderTab();
}

function goToToday() {
  curDate = todayStr();
  document.getElementById('currentDate').value = curDate;
  renderTab();
}

// =====================
// TABS
// =====================
const TABS = ['today','past','weight','weekly','templates','goals'];

function switchTab(tab) {
  curTab = tab;
  document.querySelectorAll('.nav-tab').forEach((el, i) => {
    el.classList.toggle('active', TABS[i] === tab);
  });
  TABS.forEach(t => {
    document.getElementById('tab-' + t).classList.toggle('hidden', t !== tab);
  });
  renderTab();
}

function renderTab() {
  if (curTab === 'today')     renderToday();
  else if (curTab === 'past') renderPast();
  else if (curTab === 'weight') renderWeight();
  else if (curTab === 'weekly') renderWeekly();
  else if (curTab === 'templates') renderTemplates();
  else if (curTab === 'goals') renderGoals();
}

// =====================
// TODAY
// =====================
function renderToday() {
  const rec = getRec(curDate);
  const goals = getGoals();
  const tot = totals(rec.meals);

  document.getElementById('weightInput').value = rec.weight != null ? rec.weight : '';

  // Stats cards
  const items = [
    { label:'🔥 カロリー', val: Math.round(tot.calories), unit:'kcal', goal: goals.calories },
    { label:'💪 たんぱく質', val: tot.protein.toFixed(1), unit:'g', goal: goals.protein },
    { label:'🧈 脂質', val: tot.fat.toFixed(1), unit:'g', goal: goals.fat },
    { label:'🌾 炭水化物', val: tot.carbs.toFixed(1), unit:'g', goal: goals.carbs },
  ];

  document.getElementById('todayStats').innerHTML = items.map(item => {
    const p = pct(parseFloat(item.val), item.goal);
    return `<div class="stat-card">
      <div class="stat-label">${item.label}</div>
      <div class="stat-value">${item.val}<span class="stat-unit"> ${item.unit}</span></div>
      <div class="stat-goal">目標 ${item.goal}${item.unit}</div>
      <div class="stat-pct ${pctClass(p)}">${p}%</div>
    </div>`;
  }).join('');

  // Progress bars
  const progs = [
    { label:'カロリー', v: Math.round(tot.calories), g: goals.calories, cls:'p-cal' },
    { label:'たんぱく質', v: tot.protein.toFixed(1), g: goals.protein, cls:'p-pro' },
    { label:'脂質', v: tot.fat.toFixed(1), g: goals.fat, cls:'p-fat' },
    { label:'炭水化物', v: tot.carbs.toFixed(1), g: goals.carbs, cls:'p-carb' },
  ];
  document.getElementById('progressSection').innerHTML = progs.map(p => {
    const pv = pct(parseFloat(p.v), p.g);
    return `<div class="progress-wrap">
      <div class="progress-head"><b>${p.label}</b><span>${p.v} / ${p.g}　<b class="${pctClass(pv)}">${pv}%</b></span></div>
      <div class="progress-bar"><div class="progress-fill ${p.cls}" style="width:${Math.min(pv,100)}%"></div></div>
    </div>`;
  }).join('');

  // Quick buttons
  const tmpls = getTmpl();
  document.getElementById('quickBtns').innerHTML = tmpls.length
    ? tmpls.map(t => `<button class="quick-btn" onclick="quickAdd('${t.id}')">＋ ${esc(t.name)}</button>`).join('')
    : '<span style="color:#bbb;font-size:13px">テンプレートを登録するとここに表示されます</span>';

  // Meal list
  const meals = rec.meals || [];
  if (!meals.length) {
    document.getElementById('mealList').innerHTML = `<div class="empty"><div class="empty-icon">🍽️</div><div>まだ記録がありません<br>上のフォームから追加してください</div></div>`;
    return;
  }

  const order = ['breakfast','lunch','dinner','snack'];
  let html = '';
  order.forEach(cat => {
    const group = meals.filter(m => m.category === cat);
    if (!group.length) return;
    group.forEach(m => {
      html += `<div class="meal-item">
        <div class="meal-head">
          <div>
            <span class="meal-cat cat-${cat}">${catLabel(cat)}</span>
            <div class="meal-name">${esc(m.name)}</div>
          </div>
          <div class="meal-actions">
            <button class="btn btn-sec" onclick="openEdit('${m.id}')">編集</button>
            <button class="btn btn-danger" onclick="delMeal('${m.id}')">削除</button>
          </div>
        </div>
        <div class="meal-nums">
          <span>🔥 ${Math.round(m.calories)} kcal</span>
          <span>P: ${(+m.protein).toFixed(1)}g</span>
          <span>F: ${(+m.fat).toFixed(1)}g</span>
          <span>C: ${(+m.carbs).toFixed(1)}g</span>
        </div>
      </div>`;
    });
  });
  document.getElementById('mealList').innerHTML = html;
}

function saveWeight() {
  const v = parseFloat(document.getElementById('weightInput').value);
  const rec = getRec(curDate);
  rec.weight = isNaN(v) ? null : v;
  saveRec(curDate, rec);
}

function addMeal() {
  const name = document.getElementById('mealName').value.trim();
  if (!name) { showToast('⚠️ 食品名を入力してください'); return; }
  const meal = {
    id: genId(),
    category: document.getElementById('mealCategory').value,
    name,
    calories: parseFloat(document.getElementById('mealCalories').value) || 0,
    protein:  parseFloat(document.getElementById('mealProtein').value)  || 0,
    fat:      parseFloat(document.getElementById('mealFat').value)      || 0,
    carbs:    parseFloat(document.getElementById('mealCarbs').value)    || 0,
  };
  const rec = getRec(curDate);
  rec.meals = rec.meals || [];
  rec.meals.push(meal);
  saveRec(curDate, rec);
  ['mealName','mealCalories','mealProtein','mealFat','mealCarbs'].forEach(id => document.getElementById(id).value = '');
  showToast('✅ 追加しました！');
  renderToday();
}

function quickAdd(id) {
  const t = getTmpl().find(x => x.id === id);
  if (!t) return;
  const rec = getRec(curDate);
  rec.meals = rec.meals || [];
  rec.meals.push({ id: genId(), category: t.category, name: t.name, calories: t.calories, protein: t.protein, fat: t.fat, carbs: t.carbs });
  saveRec(curDate, rec);
  showToast(`✅ 「${t.name}」を追加！`);
  renderToday();
}

function delMeal(id) {
  if (!confirm('この食事を削除しますか？')) return;
  const rec = getRec(curDate);
  rec.meals = (rec.meals||[]).filter(m => m.id !== id);
  saveRec(curDate, rec);
  showToast('🗑️ 削除しました');
  renderToday();
}

// =====================
// EDIT MODAL
// =====================
function openEdit(id) {
  const m = (getRec(curDate).meals||[]).find(x => x.id === id);
  if (!m) return;
  document.getElementById('editId').value = id;
  document.getElementById('editCategory').value = m.category;
  document.getElementById('editName').value = m.name;
  document.getElementById('editCalories').value = m.calories;
  document.getElementById('editProtein').value = m.protein;
  document.getElementById('editFat').value = m.fat;
  document.getElementById('editCarbs').value = m.carbs;
  document.getElementById('editModal').classList.add('show');
}

function closeModal() { document.getElementById('editModal').classList.remove('show'); }

function saveEdit() {
  const id = document.getElementById('editId').value;
  const rec = getRec(curDate);
  const idx = (rec.meals||[]).findIndex(m => m.id === id);
  if (idx < 0) return;
  rec.meals[idx] = {
    ...rec.meals[idx],
    category: document.getElementById('editCategory').value,
    name:     document.getElementById('editName').value.trim(),
    calories: parseFloat(document.getElementById('editCalories').value) || 0,
    protein:  parseFloat(document.getElementById('editProtein').value)  || 0,
    fat:      parseFloat(document.getElementById('editFat').value)      || 0,
    carbs:    parseFloat(document.getElementById('editCarbs').value)    || 0,
  };
  saveRec(curDate, rec);
  closeModal();
  showToast('✅ 更新しました！');
  renderToday();
}

document.getElementById('editModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });

// =====================
// PAST
// =====================
function renderPast() {
  const recs = getRecs();
  const dates = Object.keys(recs).sort().reverse();
  if (!dates.length) {
    document.getElementById('pastRecords').innerHTML = `<div class="empty"><div class="empty-icon">📅</div><div>まだ記録がありません</div></div>`;
    return;
  }
  document.getElementById('pastRecords').innerHTML = dates.map(d => {
    const r = recs[d];
    const tot = totals(r.meals);
    const isToday = d === todayStr();
    return `<div class="past-item" onclick="goDate('${d}')">
      <div class="past-date">${fmtDate(d)}${isToday ? '<span class="tag-new">今日</span>' : ''}</div>
      <div class="past-summary">
        体重: ${r.weight != null ? r.weight + ' kg' : '未記録'} &nbsp;｜&nbsp;
        ${Math.round(tot.calories)} kcal &nbsp;｜&nbsp;
        P: ${tot.protein.toFixed(1)}g &nbsp;F: ${tot.fat.toFixed(1)}g &nbsp;C: ${tot.carbs.toFixed(1)}g<br>
        食事 ${(r.meals||[]).length}件
      </div>
    </div>`;
  }).join('');
}

function goDate(d) {
  curDate = d;
  document.getElementById('currentDate').value = d;
  switchTab('today');
}

// =====================
// WEIGHT CHART
// =====================
function renderWeight() {
  const recs = getRecs();
  const today = new Date();
  const labels = [], data = [];
  for (let i = 29; i >= 0; i--) {
    const d = new Date(today); d.setDate(d.getDate() - i);
    const ds = d.toISOString().split('T')[0];
    labels.push(`${d.getMonth()+1}/${d.getDate()}`);
    const r = recs[ds];
    data.push(r && r.weight != null ? r.weight : null);
  }

  const ctx = document.getElementById('weightChart').getContext('2d');
  if (wChart) wChart.destroy();
  wChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: '体重 (kg)',
        data,
        borderColor: '#4a90d9',
        backgroundColor: 'rgba(74,144,217,0.12)',
        fill: true,
        tension: 0.4,
        pointRadius: 5,
        pointBackgroundColor: '#4a90d9',
        pointBorderColor: '#fff',
        pointBorderWidth: 2,
        spanGaps: true,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false },
        tooltip: { callbacks: { label: ctx => ctx.parsed.y + ' kg' } }
      },
      scales: {
        y: { beginAtZero: false, ticks: { callback: v => v + ' kg' } },
        x: { ticks: { maxTicksLimit: 10 } }
      }
    }
  });

  // Weight list
  const entries = Object.entries(recs)
    .filter(([,r]) => r.weight != null)
    .sort((a,b) => b[0].localeCompare(a[0]))
    .slice(0, 30);

  if (!entries.length) {
    document.getElementById('weightList').innerHTML = `<div class="empty"><div>体重の記録がありません</div></div>`;
    return;
  }

  document.getElementById('weightList').innerHTML = entries.map(([d,r]) =>
    `<div class="weekly-row">
      <span class="weekly-label">${fmtShort(d)}</span>
      <span class="weekly-val">${r.weight} kg</span>
    </div>`
  ).join('');
}

// =====================
// WEEKLY
// =====================
function renderWeekly() {
  const recs = getRecs();
  const today = new Date();
  const days = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(today); d.setDate(d.getDate() - i);
    const ds = d.toISOString().split('T')[0];
    const r = recs[ds];
    if (r && (r.meals||[]).length) days.push({ date: ds, ...totals(r.meals) });
  }

  if (!days.length) {
    document.getElementById('weeklyStats').innerHTML = `<div class="empty"><div>まだデータがありません。<br>今日から記録を始めましょう！</div></div>`;
    return;
  }

  const n = days.length;
  const avg = {
    calories: days.reduce((s,d) => s+d.calories,0) / n,
    protein:  days.reduce((s,d) => s+d.protein,0)  / n,
    fat:      days.reduce((s,d) => s+d.fat,0)      / n,
    carbs:    days.reduce((s,d) => s+d.carbs,0)    / n,
  };
  const goals = getGoals();

  document.getElementById('weeklyStats').innerHTML = `
    <p class="section-note">過去7日間のうち記録がある<b>${n}日分</b>の平均値</p>
    <div class="weekly-row"><span class="weekly-label">🔥 平均カロリー</span><span class="weekly-val">${Math.round(avg.calories)} kcal / 日</span></div>
    <div class="weekly-row"><span class="weekly-label">💪 平均たんぱく質</span><span class="weekly-val">${avg.protein.toFixed(1)} g / 日</span></div>
    <div class="weekly-row"><span class="weekly-label">🧈 平均脂質</span><span class="weekly-val">${avg.fat.toFixed(1)} g / 日</span></div>
    <div class="weekly-row"><span class="weekly-label">🌾 平均炭水化物</span><span class="weekly-val">${avg.carbs.toFixed(1)} g / 日</span></div>
    <div style="margin-top:20px">
      <div class="card-title" style="margin-bottom:12px">📊 日別カロリー</div>
      ${days.map(d => {
        const p = Math.min(pct(d.calories, goals.calories), 100);
        return `<div style="margin-bottom:10px">
          <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px">
            <span>${fmtShort(d.date)}</span>
            <span>${Math.round(d.calories)} kcal</span>
          </div>
          <div class="progress-bar"><div class="progress-fill p-cal" style="width:${p}%"></div></div>
        </div>`;
      }).join('')}
    </div>`;
}

// =====================
// TEMPLATES
// =====================
function renderTemplates() {
  const tmpls = getTmpl();
  if (!tmpls.length) {
    document.getElementById('templateList').innerHTML = `<div class="empty"><div>テンプレートがありません</div></div>`;
    return;
  }
  document.getElementById('templateList').innerHTML = tmpls.map(t => `
    <div class="meal-item">
      <div class="meal-head">
        <div>
          <span class="meal-cat cat-${t.category}">${catLabel(t.category)}</span>
          <div class="meal-name">${esc(t.name)}</div>
        </div>
        <div class="meal-actions">
          <button class="btn btn-success" onclick="addTmplToday('${t.id}')">今日に追加</button>
          <button class="btn btn-danger" onclick="delTmpl('${t.id}')">削除</button>
        </div>
      </div>
      <div class="meal-nums">
        <span>🔥 ${Math.round(t.calories)} kcal</span>
        <span>P: ${(+t.protein).toFixed(1)}g</span>
        <span>F: ${(+t.fat).toFixed(1)}g</span>
        <span>C: ${(+t.carbs).toFixed(1)}g</span>
      </div>
    </div>`).join('');
}

function addTemplate() {
  const name = document.getElementById('tmplName').value.trim();
  if (!name) { showToast('⚠️ 食品名を入力してください'); return; }
  const tmpls = getTmpl();
  tmpls.push({
    id: genId(),
    name,
    category: document.getElementById('tmplCategory').value,
    calories: parseFloat(document.getElementById('tmplCalories').value) || 0,
    protein:  parseFloat(document.getElementById('tmplProtein').value)  || 0,
    fat:      parseFloat(document.getElementById('tmplFat').value)      || 0,
    carbs:    parseFloat(document.getElementById('tmplCarbs').value)    || 0,
  });
  saveTmpl(tmpls);
  ['tmplName','tmplCalories','tmplProtein','tmplFat','tmplCarbs'].forEach(id => document.getElementById(id).value = '');
  showToast('✅ テンプレートを保存しました！');
  renderTemplates();
}

function delTmpl(id) {
  if (!confirm('このテンプレートを削除しますか？')) return;
  saveTmpl(getTmpl().filter(t => t.id !== id));
  showToast('🗑️ 削除しました');
  renderTemplates();
}

function addTmplToday(id) {
  quickAdd(id);
  switchTab('today');
}

// =====================
// GOALS
// =====================
function renderGoals() {
  const g = getGoals();
  document.getElementById('goalCalories').value = g.calories;
  document.getElementById('goalProtein').value = g.protein;
  document.getElementById('goalFat').value = g.fat;
  document.getElementById('goalCarbs').value = g.carbs;
}

function saveGoals() {
  const g = {
    calories: parseFloat(document.getElementById('goalCalories').value) || 2500,
    protein:  parseFloat(document.getElementById('goalProtein').value)  || 160,
    fat:      parseFloat(document.getElementById('goalFat').value)      || 70,
    carbs:    parseFloat(document.getElementById('goalCarbs').value)    || 300,
  };
  localStorage.setItem(K.GOALS, JSON.stringify(g));
  showToast('✅ 目標を保存しました！');
}

// DUMMY DATA
// =====================

    weight: 72.5,

      { id:genId(), category:'breakfast', name:'オートミール 80g', calories:280, protein:10, fat:5, carbs:48 },

// =====================
// INIT
// =====================
function init() {
  insertDummy();
  document.getElementById('currentDate').value = curDate;
  renderToday();
}

init();
</script>
