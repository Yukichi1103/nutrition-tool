<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NutriQuest — 栄養管理RPG</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg:    #080d18;
  --bg2:   #0d1424;
  --card:  #111827;
  --card2: #162035;
  --b1:    #1e2d42;
  --b2:    #253650;
  --cyan:  #00d4ff;
  --cyand: rgba(0,212,255,0.15);
  --green: #22c55e;
  --gd:    rgba(34,197,94,0.15);
  --amber: #f59e0b;
  --ad:    rgba(245,158,11,0.15);
  --red:   #ef4444;
  --rd:    rgba(239,68,68,0.15);
  --purp:  #a78bfa;
  --pd:    rgba(167,139,250,0.15);
  --text:  #e2e8f0;
  --dim:   #94a3b8;
  --muted: #475569;
  --r:     14px;
  --rs:    8px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Hiragino Sans',sans-serif;background:var(--bg);color:var(--text);font-size:16px;min-height:100vh;overflow-x:hidden}

/* ── HEADER ── */
.hdr{background:rgba(8,13,24,.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--b1);padding:12px 16px 8px;position:sticky;top:0;z-index:100}
.hdr-r1{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:8px}
.site-title{font-size:17px;font-weight:900;color:var(--cyan);text-shadow:0 0 18px rgba(0,212,255,.5);letter-spacing:-.3px;flex-shrink:0}
.hdr-date{font-size:11px;color:var(--muted);margin-top:2px}
.hdr-chips{display:flex;align-items:center;gap:6px;flex-shrink:0}
.chip{padding:4px 10px;border-radius:20px;font-size:12px;font-weight:700;border:1px solid}
.chip-lv{background:rgba(0,212,255,.1);border-color:rgba(0,212,255,.35);color:var(--cyan)}
.chip-str{background:rgba(245,158,11,.1);border-color:rgba(245,158,11,.35);color:var(--amber)}
.rank-badge{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:900;border:2px solid;flex-shrink:0}
.rS{background:rgba(234,179,8,.18);border-color:#eab308;color:#eab308}
.rA{background:rgba(0,212,255,.12);border-color:var(--cyan);color:var(--cyan)}
.rB{background:rgba(34,197,94,.12);border-color:var(--green);color:var(--green)}
.rC{background:rgba(148,163,184,.1);border-color:#64748b;color:#94a3b8}
.xp-row{display:flex;align-items:center;gap:8px}
.xp-track{flex:1;height:7px;background:var(--b1);border-radius:4px;overflow:hidden}
.xp-fill{height:100%;background:linear-gradient(90deg,#0e7490,var(--cyan));border-radius:4px;transition:width .6s ease;box-shadow:0 0 8px rgba(0,212,255,.45)}
.xp-txt{font-size:11px;color:var(--muted);white-space:nowrap;min-width:75px;text-align:right}

/* ── DATE BAR ── */
.dbar{background:var(--bg2);border-bottom:1px solid var(--b1);padding:8px 16px;display:flex;align-items:center;justify-content:center;gap:8px}
.dbar-btn{background:var(--card);border:1px solid var(--b1);border-radius:6px;color:var(--dim);padding:5px 12px;cursor:pointer;font-size:14px;transition:all .15s}
.dbar-btn:hover{border-color:var(--cyan);color:var(--cyan)}
#currentDate{background:var(--card);border:1px solid var(--b1);border-radius:8px;color:var(--text);padding:6px 10px;font-size:14px;cursor:pointer}
.dbar-today{background:rgba(0,212,255,.08);border:1px solid rgba(0,212,255,.3);border-radius:6px;color:var(--cyan);padding:5px 12px;cursor:pointer;font-size:12px;font-weight:700;transition:all .15s}
.dbar-today:hover{background:rgba(0,212,255,.18)}

/* ── LAYOUT ── */
.main{max-width:860px;margin:0 auto;padding:14px 14px 40px}
.sec{margin-bottom:6px}
.sec-hdr{display:flex;align-items:center;gap:8px;margin:20px 0 10px}
.sec-hdr:first-child{margin-top:0}
.sec-ttl{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:1.2px;text-transform:uppercase;white-space:nowrap}
.sec-line{flex:1;height:1px;background:var(--b1)}

/* ── CARD ── */
.card{background:var(--card);border:1px solid var(--b1);border-radius:var(--r);padding:16px}
.card+.card{margin-top:10px}

/* ── WEIGHT CARD ── */
.wcard{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.wcard-left{flex:1;min-width:160px}
.w-label{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;margin-bottom:6px}
.w-input-wrap{display:flex;align-items:baseline;gap:6px}
#weightInput{width:120px;background:rgba(255,255,255,.05);border:1.5px solid var(--b2);border-radius:var(--rs);color:var(--text);font-size:26px;font-weight:800;padding:8px 12px;text-align:center;transition:border-color .2s}
#weightInput:focus{outline:none;border-color:var(--cyan);box-shadow:0 0 0 3px rgba(0,212,255,.1)}
.w-unit{font-size:16px;color:var(--dim);font-weight:600}
.w-status{font-size:12px;margin-top:6px}
.w-ok{color:var(--green)}.w-no{color:var(--muted)}
.wcard-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.w-xp-hint{font-size:11px;color:var(--purp);font-weight:700}

/* ── STAT GRID ── */
.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:10px}
@media(min-width:500px){.stat-grid{grid-template-columns:repeat(4,1fr)}}
.scard{background:var(--card);border:1px solid var(--b1);border-radius:var(--r);padding:14px;position:relative;overflow:hidden}
.scard::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.scard.cy::before{background:linear-gradient(90deg,transparent,var(--cyan),transparent)}
.scard.gr::before{background:linear-gradient(90deg,transparent,var(--green),transparent)}
.scard.am::before{background:linear-gradient(90deg,transparent,var(--amber),transparent)}
.scard.pu::before{background:linear-gradient(90deg,transparent,var(--purp),transparent)}
.scard.re::before{background:linear-gradient(90deg,transparent,var(--red),transparent)}
.sl{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;margin-bottom:4px}
.sv{font-size:26px;font-weight:800;line-height:1.1}
.su{font-size:12px;color:var(--dim);font-weight:400}
.ss{font-size:11px;color:var(--muted);margin-top:4px}
.sp{font-size:12px;font-weight:700;margin-top:2px}

/* ── SCORE CARD ── */
.score-card{background:var(--card);border:1px solid var(--b1);border-radius:var(--r);padding:16px;text-align:center;grid-column:span 2}
@media(min-width:500px){.score-card{grid-column:auto}}
.score-top{font-size:10px;font-weight:700;letter-spacing:1px;color:var(--muted);text-transform:uppercase;margin-bottom:4px}
.score-num{font-size:52px;font-weight:900;line-height:1}
.sS{color:#eab308;text-shadow:0 0 24px rgba(234,179,8,.55)}
.sA{color:var(--cyan);text-shadow:0 0 20px rgba(0,212,255,.45)}
.sB{color:var(--green);text-shadow:0 0 20px rgba(34,197,94,.4)}
.sC{color:#94a3b8}
.rank-pill{display:inline-block;font-size:13px;font-weight:800;padding:3px 14px;border-radius:20px;border:2px solid;margin-top:6px}

/* ── GAUGE ── */
.gauge-item{margin-bottom:13px}
.gauge-item:last-child{margin-bottom:0}
.gh{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px;font-size:13px}
.g-lbl{font-weight:700;color:var(--dim)}
.g-vals{color:var(--muted);font-size:12px}
.g-pct{font-weight:700;font-size:13px}
.g-track{height:12px;background:rgba(255,255,255,.06);border-radius:6px;overflow:hidden}
.g-fill{height:100%;border-radius:6px;transition:width .5s ease}
.gc{background:linear-gradient(90deg,#b91c1c,#ef4444);box-shadow:0 0 8px rgba(239,68,68,.4)}
.gp{background:linear-gradient(90deg,#0e7490,#06b6d4);box-shadow:0 0 8px rgba(6,182,212,.4)}
.gf{background:linear-gradient(90deg,#92400e,#f59e0b);box-shadow:0 0 8px rgba(245,158,11,.4)}
.gb{background:linear-gradient(90deg,#5b21b6,#8b5cf6);box-shadow:0 0 8px rgba(139,92,246,.4)}

/* ── MISSIONS ── */
.mission-list{display:flex;flex-direction:column;gap:8px}
.mi{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,.03);border:1px solid var(--b1);border-radius:var(--rs);padding:12px 14px;transition:all .35s}
.mi.done{background:rgba(34,197,94,.06);border-color:rgba(34,197,94,.28)}
@keyframes mflash{0%{background:rgba(34,197,94,.3)}100%{background:rgba(34,197,94,.06)}}
.mi.flash{animation:mflash .5s ease}
.mi-icon{width:28px;height:28px;border-radius:50%;border:2px solid var(--b2);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;transition:all .3s}
.mi.done .mi-icon{background:var(--green);border-color:var(--green);box-shadow:0 0 10px rgba(34,197,94,.5);color:#fff}
.mi-info{flex:1}
.mi-lbl{font-size:14px;font-weight:600}
.mi.done .mi-lbl{color:var(--dim);text-decoration:line-through}
.mi-xp{font-size:11px;color:var(--purp);font-weight:700;margin-top:2px}
.mi.done .mi-xp{color:var(--green)}

/* ── QUICK ── */
.quick-wrap{display:flex;flex-wrap:wrap;gap:8px}
.qbtn{padding:7px 14px;background:rgba(0,212,255,.07);border:1px solid rgba(0,212,255,.25);border-radius:20px;color:var(--cyan);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap}
.qbtn:hover{background:rgba(0,212,255,.18);border-color:var(--cyan)}

/* ── FORMS ── */
.fg{margin-bottom:12px}
.fl{display:block;font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;margin-bottom:5px}
.fi{width:100%;background:rgba(255,255,255,.04);border:1.5px solid var(--b2);border-radius:var(--rs);color:var(--text);font-size:15px;padding:10px 13px;transition:border-color .2s,box-shadow .2s;-webkit-appearance:none;appearance:none}
.fi:focus{outline:none;border-color:var(--cyan);box-shadow:0 0 0 3px rgba(0,212,255,.1)}
.fi::placeholder{color:var(--muted)}
select.fi{cursor:pointer}
.frow{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
@media(min-width:500px){.frow4{grid-template-columns:repeat(4,1fr)}}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:10px 18px;border:none;border-radius:var(--rs);font-size:14px;font-weight:700;cursor:pointer;transition:all .2s}
.btn-bl{width:100%}
.btn-p{background:linear-gradient(135deg,#0e7490,#0891b2);color:#fff;box-shadow:0 0 16px rgba(0,212,255,.22)}
.btn-p:hover{transform:translateY(-1px);box-shadow:0 0 24px rgba(0,212,255,.4)}
.btn-s{background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.35);color:var(--green)}
.btn-s:hover{background:rgba(34,197,94,.22)}
.btn-d{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.28);color:var(--red);padding:5px 11px;font-size:12px}
.btn-d:hover{background:rgba(239,68,68,.2)}
.btn-e{background:rgba(255,255,255,.06);border:1px solid var(--b2);color:var(--dim);padding:5px 11px;font-size:12px}
.btn-e:hover{background:rgba(255,255,255,.1)}

/* ── MEAL LIST ── */
.meal-item{background:rgba(255,255,255,.025);border:1px solid var(--b1);border-radius:var(--rs);padding:12px 14px;margin-bottom:8px;transition:border-color .2s}
.meal-item:hover{border-color:var(--b2)}
.mh{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:8px}
.mn{font-size:14px;font-weight:700;margin-top:4px}
.mcat{display:inline-block;padding:2px 9px;border-radius:10px;font-size:11px;font-weight:700}
.cbr{background:rgba(245,158,11,.14);color:var(--amber)}
.clu{background:rgba(34,197,94,.12);color:var(--green)}
.cdi{background:rgba(167,139,250,.14);color:var(--purp)}
.csn{background:rgba(239,68,68,.12);color:var(--red)}
.mact{display:flex;gap:5px;flex-shrink:0}
.mnums{display:flex;gap:10px;flex-wrap:wrap;font-size:12px;color:var(--muted)}
.mnums span{white-space:nowrap}

/* ── BADGES ── */
.badge-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
@media(min-width:480px){.badge-grid{grid-template-columns:repeat(4,1fr)}}
@media(min-width:680px){.badge-grid{grid-template-columns:repeat(6,1fr)}}
.bc{background:rgba(255,255,255,.025);border:1.5px solid var(--b1);border-radius:10px;padding:12px 8px;text-align:center;transition:all .2s}
.bc.earned{background:rgba(234,179,8,.06);border-color:rgba(234,179,8,.32);box-shadow:0 0 12px rgba(234,179,8,.08)}
.bc.earned:hover{transform:translateY(-2px)}
.be{font-size:26px;display:block;margin-bottom:5px}
.bc.locked .be{filter:grayscale(1);opacity:.25}
.bn{font-size:11px;font-weight:700;color:var(--dim)}
.bc.locked .bn{color:var(--muted)}
.bdate{font-size:10px;color:var(--amber);margin-top:3px}
.bcond{font-size:10px;color:var(--muted);margin-top:2px}

/* ── STATUS ── */
.st-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
@media(min-width:500px){.st-grid{grid-template-columns:repeat(4,1fr)}}
.stcard{background:var(--card);border:1px solid var(--b1);border-radius:var(--r);padding:14px;text-align:center}
.stv{font-size:34px;font-weight:900;line-height:1;margin:6px 0 4px}
.stl{font-size:10px;color:var(--muted);font-weight:700;letter-spacing:.6px;text-transform:uppercase}
.stbar{height:4px;background:var(--b1);border-radius:2px;overflow:hidden;margin-top:8px}
.stfill{height:100%;border-radius:2px}

/* ── PAST / COLLAPSE ── */
.coll-btn{width:100%;background:rgba(255,255,255,.03);border:1px solid var(--b1);border-radius:var(--rs);color:var(--dim);font-size:14px;font-weight:600;padding:12px 16px;text-align:left;cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:all .2s}
.coll-btn:hover{background:rgba(255,255,255,.06);border-color:var(--b2)}
.past-item{background:rgba(255,255,255,.025);border:1px solid var(--b1);border-radius:var(--rs);padding:12px 14px;margin-top:8px;cursor:pointer;transition:all .2s}
.past-item:hover{border-color:var(--cyan);background:rgba(0,212,255,.04)}
.past-date{font-size:14px;font-weight:700;margin-bottom:3px}
.past-sum{font-size:12px;color:var(--muted);line-height:1.6}
.tag-td{display:inline-block;background:var(--cyan);color:#000;font-size:10px;padding:2px 7px;border-radius:5px;margin-left:6px;font-weight:800;vertical-align:middle}

/* ── CHART ── */
.chart-wrap{position:relative;height:240px}

/* ── WEIGHT SECTION ── */
.ws-card{background:var(--card);border:1px solid var(--b1);border-radius:var(--r);padding:16px;box-shadow:0 0 28px rgba(0,212,255,.06)}
.ws-stats{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px}
@media(min-width:480px){.ws-stats{grid-template-columns:repeat(4,1fr)}}
.wssc{background:rgba(255,255,255,.03);border:1px solid var(--b1);border-radius:10px;padding:11px 10px;text-align:center}
.wssc-l{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.6px;text-transform:uppercase;margin-bottom:3px}
.wssc-v{font-size:20px;font-weight:800;line-height:1.1}
.wssc-s{font-size:11px;margin-top:3px;color:var(--muted)}
.ws-goal-row{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.ws-gl{font-size:12px;color:var(--dim);font-weight:600;white-space:nowrap}
.wgi{width:88px;background:rgba(255,255,255,.05);border:1.5px solid var(--b2);border-radius:6px;color:var(--text);font-size:14px;font-weight:700;padding:5px 8px;text-align:center;-webkit-appearance:none;appearance:none}
.wgi:focus{outline:none;border-color:var(--cyan);box-shadow:0 0 0 3px rgba(0,212,255,.1)}
.ws-gdiff{font-size:13px;font-weight:700}
.ws-period{display:flex;gap:6px;margin-bottom:12px}
.wpb{flex:1;padding:8px 0;background:rgba(255,255,255,.04);border:1px solid var(--b1);border-radius:8px;color:var(--dim);font-size:13px;font-weight:700;cursor:pointer;transition:all .2s}
.wpb.on{background:rgba(0,212,255,.12);border-color:rgba(0,212,255,.4);color:var(--cyan);box-shadow:0 0 10px rgba(0,212,255,.15)}
.ws-comment{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:10px;margin-bottom:14px;font-size:14px;font-weight:600}
.wc-up  {background:rgba(34,197,94,.09); border:1px solid rgba(34,197,94,.28); color:var(--green)}
.wc-down{background:rgba(239,68,68,.08); border:1px solid rgba(239,68,68,.22); color:var(--red)}
.wc-flat{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.22);color:var(--amber)}
.wc-none{background:rgba(255,255,255,.03);border:1px solid var(--b1);color:var(--muted)}
.ws-empty{text-align:center;padding:44px 20px}
.ws-empty-icon{font-size:38px;margin-bottom:10px;opacity:.35;display:block}
.ws-empty-txt{color:var(--muted);font-size:14px;line-height:1.6}
.wc-delta{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.wcd{background:rgba(255,255,255,.03);border:1px solid var(--b1);border-radius:10px;padding:10px 13px;display:flex;align-items:center;gap:10px}
.wcd-icon{font-size:18px;flex-shrink:0}
.wcd-info{flex:1}
.wcd-label{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;margin-bottom:2px}
.wcd-val{font-size:17px;font-weight:800;line-height:1}

/* ── MODALS ── */
.modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:1000;align-items:center;justify-content:center;padding:16px}
.modal-ov.show{display:flex}
.modal{background:var(--card2);border:1px solid var(--b2);border-radius:18px;padding:24px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;box-shadow:0 0 60px rgba(0,0,0,.6)}
.modal-ttl{font-size:18px;font-weight:800;margin-bottom:20px}
.modal-act{display:flex;gap:10px;margin-top:20px}

/* REWARD */
.rew{text-align:center;padding:16px 0}
.rew-icon{font-size:64px;display:block;margin-bottom:14px;animation:popIn .4s cubic-bezier(.175,.885,.32,1.275)}
@keyframes popIn{0%{transform:scale(0)}70%{transform:scale(1.12)}100%{transform:scale(1)}}
.rew-title{font-size:24px;font-weight:800;margin-bottom:8px}
.rew-sub{font-size:15px;color:var(--dim);line-height:1.5;margin-bottom:22px}
.rew-btn{background:linear-gradient(135deg,#0e7490,var(--cyan));color:#fff;border:none;border-radius:12px;padding:14px;font-size:16px;font-weight:700;cursor:pointer;width:100%;box-shadow:0 0 20px rgba(0,212,255,.3);transition:all .2s}
.rew-btn:hover{transform:translateY(-1px);box-shadow:0 0 30px rgba(0,212,255,.5)}

/* TOAST */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--card2);border:1px solid var(--b2);color:var(--text);padding:11px 22px;border-radius:22px;font-size:14px;z-index:2000;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.toast.show{opacity:1}

/* XP FLOAT */
.xpf{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:22px;font-weight:900;color:var(--cyan);text-shadow:0 0 16px rgba(0,212,255,.8);pointer-events:none;z-index:3000;animation:floatUp 1.2s ease forwards}
@keyframes floatUp{0%{opacity:1;transform:translate(-50%,-50%)}100%{opacity:0;transform:translate(-50%,-130%)}}

/* MISC */
.empty{text-align:center;padding:28px 16px;color:var(--muted)}
.ei{font-size:36px;margin-bottom:8px;opacity:.4}
.hidden{display:none!important}
.divider{height:1px;background:var(--b1);margin:16px 0}
.snote{font-size:12px;color:var(--muted);margin-bottom:12px;line-height:1.5}

@media(max-width:480px){

<body>

<!-- ═══════════════════ HEADER ═══════════════════ -->
<div class="hdr">
  <div class="hdr-r1">
    <div>
      <div class="site-title">⚡ NutriQuest</div>
      <div class="hdr-date" id="hdrDate"></div>
    </div>
    <div class="hdr-chips">
      <span class="chip chip-str" id="chipStr">🔥 0日</span>
      <span class="chip chip-lv" id="chipLv">Lv.1</span>

    </div>
  </div>
  <div class="xp-row">
    <div class="xp-track"><div class="xp-fill" id="xpFill" style="width:0%"></div></div>
    <div class="xp-txt" id="xpTxt">0 / 150 XP</div>
  </div>
</div>

<!-- ═══════════════════ DATE BAR ═══════════════════ -->
<div class="dbar">
  <button class="dbar-btn" onclick="changeDate(-1)">◀</button>

  <button class="dbar-btn" onclick="changeDate(1)">▶</button>

</div>

<!-- ═══════════════════ MAIN ═══════════════════ -->
<div class="main">

  <!-- DASHBOARD -->
  <div class="sec-hdr"><span class="sec-ttl">📊 ダッシュボード</span><div class="sec-line"></div></div>

  <!-- Weight card (never re-rendered — preserves input) -->
  <div class="card">
    <div class="wcard">
      <div class="wcard-left">
        <div class="w-label">⚖️ 今日の体重</div>
        <div class="w-input-wrap">

          <span class="w-unit">kg</span>
        </div>
        <div id="wStatus" class="w-status w-no">未入力（入力で +20 XP）</div>
      </div>
      <div class="wcard-right">
        <div id="wXpHint" class="w-xp-hint" style="display:none">✅ +20 XP 獲得！</div>
      </div>
    </div>

  <!-- Stat grid + Score -->
  <div class="stat-grid" id="statGrid"></div>

  <!-- GAUGES -->
  <div class="sec-hdr"><span class="sec-ttl">📈 達成ゲージ</span><div class="sec-line"></div></div>
  <div class="card"><div id="gaugeArea"></div></div>

  <!-- MISSIONS -->
  <div class="sec-hdr"><span class="sec-ttl">📝 デイリーミッション</span><div class="sec-line"></div></div>
  <div class="card"><div class="mission-list" id="missionList"></div></div>

  <!-- QUICK ADD -->
  <div class="sec-hdr"><span class="sec-ttl">⚡ クイック追加</span><div class="sec-line"></div></div>
  <div class="card"><div class="quick-wrap" id="quickBtns"></div></div>

  <!-- ADD FORM -->
  <div class="sec-hdr"><span class="sec-ttl">➕ 食事を追加</span><div class="sec-line"></div></div>
  <div class="card">
    <div class="fg">
      <label class="fl">食事区分</label>
      <select id="mealCategory" class="fi">
        <option value="breakfast">🌅 朝食</option>
        <option value="lunch">☀️ 昼食</option>
        <option value="dinner">🌙 夕食</option>
        <option value="snack">🍪 間食</option>
      </select>
    </div>
    <div class="fg">
      <label class="fl">食品名</label>
      <input type="text" id="mealName" class="fi" placeholder="例：鶏むね肉 100g、おにぎり">
    </div>
    <div class="frow frow4">
      <div class="fg"><label class="fl">カロリー (kcal)</label><input type="number" id="mealCalories" class="fi" placeholder="200" min="0"></div>
      <div class="fg"><label class="fl">たんぱく質 (g)</label><input type="number" id="mealProtein"  class="fi" placeholder="30"  min="0" step="0.1"></div>
      <div class="fg"><label class="fl">脂質 (g)</label>      <input type="number" id="mealFat"      class="fi" placeholder="5"   min="0" step="0.1"></div>
      <div class="fg"><label class="fl">炭水化物 (g)</label>  <input type="number" id="mealCarbs"    class="fi" placeholder="30"  min="0" step="0.1"></div>

    <button class="btn btn-p btn-bl" onclick="addMeal()">追加する</button>

  <!-- MEAL LIST -->

  <!-- WEIGHT SECTION -->
  <div class="sec-hdr"><span class="sec-ttl">📉 体重推移</span><div class="sec-line"></div></div>
  <div class="ws-card">
    <!-- Stats row -->

    <!-- Goal weight -->

      <span class="ws-gl">🎯 目標体重</span>

    <span>過去の記録を見る</span><span id="pastChev">▼</span>
  </button>
  <div class="hidden" id="pastColl"><div id="pastRecs"></div></div>

  <!-- SETTINGS -->

    <span>目標・テンプレート設定</span><span id="setChev">▼</span>
  </button>
  <div class="hidden" id="setColl">
    <div id="setContent"></div>

</div><!-- /main -->

<!-- ═══ REWARD MODAL ═══ -->
<div class="modal-ov" id="rewardModal">
  <div class="modal"><div class="rew" id="rewBody"></div></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ════════════════════════════════════════════════
// CONSTANTS
// ════════════════════════════════════════════════
const XP_PER_LV = 150;

const RANKS = [
  { min:90, r:'S', cls:'rS', sc:'sS' },
  { min:75, r:'A', cls:'rA', sc:'sA' },
  { min:55, r:'B', cls:'rB', sc:'sB' },
  { min:0,  r:'C', cls:'rC', sc:'sC' },
];

const BADGE_DEFS = [
  { id:'first',    e:'🌟', n:'初記録',       c:'最初の1食を記録' },
  { id:'streak3',  e:'🔥', n:'3日継続',      c:'3日連続記録' },
  { id:'streak7',  e:'💎', n:'1週間連続',    c:'7日連続記録' },
  { id:'streak30', e:'👑', n:'30日継続',     c:'30日連続記録' },
  { id:'protein5', e:'💪', n:'プロテイン番長',c:'タンパク質目標 5日達成' },
  { id:'cal5',     e:'🔋', n:'カロリー管理人',c:'カロリー目標 5日達成' },
  { id:'highscore',e:'⭐', n:'完璧な1日',    c:'スコア90点以上を達成' },
  { id:'lv10',     e:'🚀', n:'Lv.10到達',    c:'レベル10に到達' },
  { id:'meal50',   e:'🍱', n:'50食達成',     c:'累計50食を記録' },
];

// ════════════════════════════════════════════════
// STORAGE
// ════════════════════════════════════════════════
const K = { REC:'nt_records', GOALS:'nt_goals', TMPL:'nt_templates', GAME:'nt_game' };

const getRecs = () => JSON.parse(localStorage.getItem(K.REC) || '{}');
const getRec  = d => getRecs()[d] || { weight:null, meals:[] };
function saveRec(d, data) { const r=getRecs(); r[d]=data; localStorage.setItem(K.REC,JSON.stringify(r)); }

const getGoals = () => Object.assign(
  { calories:2500, protein:160, fat:70, carbs:300 },
  JSON.parse(localStorage.getItem(K.GOALS)||'{}')
);
const getGame = () => Object.assign(
  { badges:[] },
  JSON.parse(localStorage.getItem(K.GAME)||'{}')
);
const saveGame = g => localStorage.setItem(K.GAME, JSON.stringify(g));

function getTmpl() {
  const s = localStorage.getItem(K.TMPL);
  if (s) return JSON.parse(s);
  return [
    {id:'t1',name:'ホエイプロテイン',category:'snack',    calories:110,protein:20,  fat:1.5,carbs:6  },
    {id:'t2',name:'鶏むね肉 100g',  category:'lunch',    calories:108,protein:23,  fat:1.5,carbs:0  },
    {id:'t3',name:'ご飯 200g',      category:'lunch',    calories:336,protein:5,   fat:0.5,carbs:74 },
    {id:'t4',name:'卵 1個',         category:'breakfast',calories:76, protein:6.2, fat:5,  carbs:0.2},
    {id:'t5',name:'バナナ 1本',     category:'snack',    calories:86, protein:1,   fat:0.2,carbs:22 },
    {id:'t6',name:'サラダチキン',   category:'lunch',    calories:113,protein:24,  fat:1.5,carbs:0  },
  ];
}
const saveTmpl = t => localStorage.setItem(K.TMPL, JSON.stringify(t));

// ════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════
let curDate  = todayStr();
let wChart   = null;
let rewQ     = [];
let wPeriod  = 30;

function todayStr() { return new Date().toISOString().split('T')[0]; }
function fmtDate(ds) {
  const d=new Date(ds+'T00:00:00'), D=['日','月','火','水','木','金','土'];
  return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${D[d.getDay()]}）`;
}
function fmtShort(ds) {
  const d=new Date(ds+'T00:00:00'), D=['日','月','火','水','木','金','土'];
  return `${d.getMonth()+1}/${d.getDate()}（${D[d.getDay()]}）`;
}

// ════════════════════════════════════════════════
// UTILS
// ════════════════════════════════════════════════
function totals(meals) {
  return (meals||[]).reduce((a,m)=>({
    calories:a.calories+(+m.calories||0),
    protein: a.protein +(+m.protein ||0),
    fat:     a.fat     +(+m.fat     ||0),
    carbs:   a.carbs   +(+m.carbs   ||0),
  }),{calories:0,protein:0,fat:0,carbs:0});
}
function clamp(v,a,b){return Math.min(Math.max(v,a),b)}
function pctOf(v,g){return g?Math.round(v/g*100):0}
function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function catLabel(c){return{breakfast:'朝食',lunch:'昼食',dinner:'夕食',snack:'間食'}[c]||c}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function showToast(msg) {
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(el._t); el._t=setTimeout(()=>el.classList.remove('show'),2400);
}
function floatXP(v) {
  const el=document.createElement('div');
  el.className='xpf'; el.textContent=`+${v} XP`;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1300);
}

// ════════════════════════════════════════════════
// SCORE (0–100)
// ════════════════════════════════════════════════
function calcScore(rec, goals) {
  const meals=rec.meals||[], tot=totals(meals);
  let s=0;
  // Calories 25pts
  if (goals.calories>0) {
    const r=tot.calories/goals.calories;
    if (r>=.9&&r<=1.1) s+=25;
    else if (r<.9) s+=Math.round(r/.9*25);
    else s+=Math.round(clamp(2-r,0,1)*25);
  }
  // Protein 30pts
  if (goals.protein>0) s+=Math.round(clamp(tot.protein/goals.protein,0,1)*30);
  // Fat 15pts
  if (goals.fat>0) {
    const r=tot.fat/goals.fat;
    if (r>=.8&&r<=1.2) s+=15;
    else if (r<.8) s+=Math.round(r/.8*15);
    else s+=Math.round(clamp(2-r,0,1)*15);
  }
  // Carbs 15pts
  if (goals.carbs>0) {
    const r=tot.carbs/goals.carbs;
    if (r>=.8&&r<=1.2) s+=15;
    else if (r<.8) s+=Math.round(r/.8*15);
    else s+=Math.round(clamp(2-r,0,1)*15);
  }
  // Weight 10pts
  if (rec.weight!=null) s+=10;
  // Meals 3+ : 5pts
  if (meals.length>=3) s+=5;
  return clamp(Math.round(s),0,100);
}
function getRank(score) { return RANKS.find(r=>score>=r.min)||RANKS[3]; }

// ════════════════════════════════════════════════
// XP & LEVEL
// ════════════════════════════════════════════════
function computeXP() {
  const recs=getRecs(), g=getGoals();
  let xp=0;
  Object.values(recs).forEach(rec=>{
    const m=rec.meals||[];
    xp+=m.length*10;
    if (rec.weight!=null) xp+=20;
    const t=totals(m);
    if (m.length>0){
      if (t.calories>=g.calories) xp+=50;
      if (t.protein>=g.protein)   xp+=100;
    }
  });
  return xp;
}
function xpInfo(xp){ return { level:Math.floor(xp/XP_PER_LV)+1, inLv:xp%XP_PER_LV }; }

// ════════════════════════════════════════════════
// STREAK
// ════════════════════════════════════════════════
function computeStreak() {
  const recs=getRecs(); let s=0;
  const d=new Date(todayStr()+'T00:00:00');
  while(true){
    const ds=d.toISOString().split('T')[0];
    const r=recs[ds];
    if (r&&(r.meals||[]).length>0){s++;d.setDate(d.getDate()-1);}
    else break;
  }
  return s;
}

// ════════════════════════════════════════════════
// MISSIONS
// ════════════════════════════════════════════════
function getMissions(rec, goals) {
  const m=rec.meals||[], t=totals(m);
  return [
    {id:'mw', icon:'⚖️', label:'体重を入力する',      done:rec.weight!=null,          xp:20 },
    {id:'mp', icon:'💪', label:'タンパク質100g以上達成',done:m.length>0&&t.protein>=100, xp:100},
    {id:'m3', icon:'🍽️', label:'食事を3回以上記録',    done:m.length>=3,               xp:30 },
  ];
}

// ════════════════════════════════════════════════
// BADGES
// ════════════════════════════════════════════════
function checkBadges() {
  const game=getGame(), earned=new Set(game.badges.map(b=>b.id));
  const recs=getRecs(), goals=getGoals();
  const streak=computeStreak();
  const {level}=xpInfo(computeXP());
  const allMeals=Object.values(recs).flatMap(r=>r.meals||[]);
  function metDays(fn){return Object.values(recs).filter(r=>(r.meals||[]).length>0&&fn(totals(r.meals),r)).length}
  const conds = {
    first:    allMeals.length>=1,
    streak3:  streak>=3,
    streak7:  streak>=7,
    streak30: streak>=30,
    protein5: metDays(t=>t.protein>=goals.protein)>=5,
    cal5:     metDays(t=>t.calories>=goals.calories)>=5,
    highscore:Object.values(recs).some(r=>calcScore(r,goals)>=90),
    lv10:     level>=10,
    meal50:   allMeals.length>=50,
  };
  const newly=[];
  BADGE_DEFS.forEach(def=>{
    if (!earned.has(def.id)&&conds[def.id]){
      game.badges.push({id:def.id,earnedAt:todayStr()});
      newly.push(def.id);
    }
  });
  if (newly.length) saveGame(game);
  return newly;
}

// ════════════════════════════════════════════════
// STATUS
// ════════════════════════════════════════════════
function computeStatus() {
  const recs=getRecs(), goals=getGoals(), streak=computeStreak();
  const active=Object.values(recs).filter(r=>(r.meals||[]).length>0);
  const last7=[]; for(let i=0;i<7;i++){const d=new Date(todayStr()+'T00:00:00');d.setDate(d.getDate()-i);const r=recs[d.toISOString().split('T')[0]];if(r&&(r.meals||[]).length)last7.push(calcScore(r,goals));}
  const avgScore=last7.length?Math.round(last7.reduce((a,b)=>a+b,0)/last7.length):0;
  const calAvg=active.length?active.reduce((s,r)=>s+totals(r.meals).calories,0)/active.length:0;
  const proAvg=active.length?active.reduce((s,r)=>s+totals(r.meals).protein,0)/active.length:0;
  return {
    persistence: Math.min(streak*5,100),
    nutrition:   avgScore,
    bulking:     Math.min(pctOf(calAvg,goals.calories),100),
    recovery:    Math.min(pctOf(proAvg,goals.protein),100),
  };
}

// ════════════════════════════════════════════════
// RENDER: HEADER
// ════════════════════════════════════════════════
function renderHeader() {
  const xp=computeXP(), {level,inLv}=xpInfo(xp);
  const streak=computeStreak();
  const rec=getRec(curDate), goals=getGoals();
  const score=calcScore(rec,goals), rank=getRank(score);
  const pct=Math.round(inLv/XP_PER_LV*100);

  document.getElementById('hdrDate').textContent=fmtDate(curDate);
  document.getElementById('chipLv').textContent=`Lv.${level}`;
  const sc=document.getElementById('chipStr');
  sc.textContent=streak>0?`🔥 ${streak}日連続`:'❄️ 0日'; sc.style.opacity=streak>0?'1':'.5';
  const rb=document.getElementById('rankBadge');
  rb.textContent=rank.r; rb.className='rank-badge '+rank.cls;
  document.getElementById('xpFill').style.width=pct+'%';
  document.getElementById('xpTxt').textContent=`${inLv} / ${XP_PER_LV} XP`;
}

// ════════════════════════════════════════════════
// RENDER: WEIGHT CARD (only update value/status, not HTML)
// ════════════════════════════════════════════════
function updateWeightCard() {
  const rec=getRec(curDate);
  const el=document.getElementById('weightInput');
  if (document.activeElement!==el) el.value=rec.weight!=null?rec.weight:'';
  document.getElementById('wStatus').innerHTML=rec.weight!=null
    ?`<span class="w-ok">✅ 記録済み — ${rec.weight} kg</span>`
    :'<span class="w-no">未入力（入力で +20 XP）</span>';
  document.getElementById('wXpHint').style.display=rec.weight!=null?'block':'none';
}

// ════════════════════════════════════════════════
// RENDER: STAT GRID + SCORE
// ════════════════════════════════════════════════
function renderStats() {
  const rec=getRec(curDate), goals=getGoals(), tot=totals(rec.meals);
  const score=calcScore(rec,goals), rank=getRank(score);

  const cards=[
    {cl:'re',icon:'🔥',lbl:'カロリー',  v:Math.round(tot.calories),u:'kcal',sub:`目標 ${goals.calories} kcal`,p:pctOf(tot.calories,goals.calories)},
    {cl:'cy',icon:'💪',lbl:'たんぱく質',v:tot.protein.toFixed(1), u:'g',   sub:`目標 ${goals.protein} g`,   p:pctOf(tot.protein,goals.protein)},
    {cl:'am',icon:'🧈',lbl:'脂質',      v:tot.fat.toFixed(1),     u:'g',   sub:`目標 ${goals.fat} g`,       p:pctOf(tot.fat,goals.fat)},
    {cl:'pu',icon:'🌾',lbl:'炭水化物',  v:tot.carbs.toFixed(1),   u:'g',   sub:`目標 ${goals.carbs} g`,     p:pctOf(tot.carbs,goals.carbs)},
  ];

  const pc=p=>p>=100?'var(--amber)':p>=80?'var(--green)':p>=50?'var(--cyan)':'var(--red)';

  const statHtml=cards.map(c=>`
    <div class="scard ${c.cl}">
      <div class="sl">${c.icon} ${c.lbl}</div>
      <div class="sv">${c.v}<span class="su"> ${c.u}</span></div>
      <div class="ss">${c.sub}</div>
      <div class="sp" style="color:${pc(c.p)}">${c.p}%</div>
    </div>`).join('');

  const scoreHtml=`
    <div class="score-card" style="border-color:${score>=90?'rgba(234,179,8,.35)':score>=75?'rgba(0,212,255,.28)':score>=55?'rgba(34,197,94,.22)':'var(--b1)'}">
      <div class="score-top">TODAY'S SCORE</div>
      <div class="score-num ${rank.sc}">${score}</div>
      <div class="rank-pill rank-badge ${rank.cls}" style="margin:8px auto 0">${rank.r} ランク</div>
    </div>`;

  document.getElementById('statGrid').innerHTML=statHtml+scoreHtml;
}

// ════════════════════════════════════════════════
// RENDER: WEIGHT SECTION (stats + comment + chart)
// ════════════════════════════════════════════════

function setWPeriod(n) {
  wPeriod = n;
  document.getElementById('wpb7').classList.toggle('on', n===7);
  document.getElementById('wpb30').classList.toggle('on', n===30);
  document.getElementById('wpbAll').classList.toggle('on', n===0);
  renderWeightSection();
}

function saveGoalWeight() {
  const v = parseFloat(document.getElementById('goalWeightInput').value);
  if (isNaN(v)) { localStorage.removeItem('nt_goalweight'); }
  else { localStorage.setItem('nt_goalweight', v); }
  renderWeightSection();
}

function renderWeightSection() {
  const recs    = getRecs();
  const today   = new Date();
  const todayDs = todayStr();

  // ── build day array ──
  let days = [];
  if (wPeriod === 0) {
    const allDates = Object.keys(recs).sort();
    if (allDates.length > 0) {
      const first = new Date(allDates[0] + 'T00:00:00');
      for (let d = new Date(first); d <= today; d.setDate(d.getDate() + 1)) {
        const ds = d.toISOString().split('T')[0];
        const r  = recs[ds];
        const dd = new Date(d);
        days.push({ ds, label:`${dd.getMonth()+1}/${dd.getDate()}`, w: r&&r.weight!=null ? r.weight : null });
      }
    }
  } else {
    for (let i = wPeriod - 1; i >= 0; i--) {
      const d  = new Date(today); d.setDate(d.getDate() - i);
      const ds = d.toISOString().split('T')[0];
      const r  = recs[ds];
      days.push({ ds, label:`${d.getMonth()+1}/${d.getDate()}`, w: r&&r.weight!=null ? r.weight : null });
    }
  }

  const recorded = days.filter(d => d.w !== null);
  const hasData  = recorded.length >= 1;

  // ── today & yesterday ──
  const todayW = recs[todayDs] && recs[todayDs].weight != null ? recs[todayDs].weight : null;
  const ydDs   = (() => { const d=new Date(today); d.setDate(d.getDate()-1); return d.toISOString().split('T')[0]; })();
  const ydW    = recs[ydDs]   && recs[ydDs].weight   != null ? recs[ydDs].weight   : null;

  // ── 7-day average (stat card) ──
  const last7arr = [];
  for (let i = 6; i >= 0; i--) {
    const d=new Date(today); d.setDate(d.getDate()-i);
    const r=recs[d.toISOString().split('T')[0]];
    if (r && r.weight!=null) last7arr.push(r.weight);
  }
  const avg7 = last7arr.length ? +(last7arr.reduce((a,b)=>a+b,0)/last7arr.length).toFixed(1) : null;

  // ── 変化量 (delta) ──
  const latestW = recorded.length > 0 ? recorded[recorded.length-1].w : null;
  const d7ago   = new Date(today); d7ago.setDate(d7ago.getDate()-7);
  const w7ago   = (recs[d7ago.toISOString().split('T')[0]]||{}).weight ?? null;
  const d30ago  = new Date(today); d30ago.setDate(d30ago.getDate()-30);
  const w30ago  = (recs[d30ago.toISOString().split('T')[0]]||{}).weight ?? null;
  const delta7  = (latestW!==null && w7ago!==null)  ? +(latestW - w7ago).toFixed(1)  : null;
  const delta30 = (latestW!==null && w30ago!==null) ? +(latestW - w30ago).toFixed(1) : null;

  // ── goal weight ──
  const gw = parseFloat(localStorage.getItem('nt_goalweight')) || null;
  const goalInput = document.getElementById('goalWeightInput');
  if (goalInput && document.activeElement !== goalInput) {
    goalInput.value = gw !== null ? gw : '';
  }

  // ── goal diff ──
  const gdEl = document.getElementById('wsGoalDiff');
  if (gw !== null && todayW !== null) {
    const diff = +(todayW - gw).toFixed(1);
    if (diff > 0) { gdEl.textContent = `目標まで −${diff} kg`; gdEl.style.color='var(--amber)'; }
    else if (diff < 0) { gdEl.textContent = `目標を ${Math.abs(diff)} kg 超過`; gdEl.style.color='var(--green)'; }
    else { gdEl.textContent = '🎯 目標達成！'; gdEl.style.color='var(--cyan)'; }
  } else { gdEl.textContent = gw===null ? '目標を入力してください' : '体重を入力してください'; gdEl.style.color='var(--muted)'; }

  // ── stats cards ──
  const dayDiff   = (todayW!==null && ydW!==null) ? +(todayW - ydW).toFixed(1) : null;
  const diffSign  = dayDiff===null ? '' : dayDiff > 0 ? '+' : '';
  const diffColor = dayDiff===null ? 'var(--muted)' : dayDiff > 0 ? 'var(--amber)' : dayDiff < 0 ? 'var(--green)' : 'var(--dim)';
  document.getElementById('wsStats').innerHTML = `
    <div class="wssc">
      <div class="wssc-l">今日の体重</div>
      <div class="wssc-v" style="color:var(--cyan)">${todayW!==null ? todayW : '--'}<span style="font-size:13px;color:var(--dim);font-weight:400"> kg</span></div>
      <div class="wssc-s">${todayW!==null ? '記録済み ✓' : '未記録'}</div>
    </div>
    <div class="wssc">
      <div class="wssc-l">前日比</div>
      <div class="wssc-v" style="color:${diffColor}">${dayDiff!==null ? diffSign+dayDiff : '--'}<span style="font-size:13px;color:var(--dim);font-weight:400">${dayDiff!==null?' kg':''}</span></div>
      <div class="wssc-s">${ydW!==null ? '昨日: '+ydW+' kg' : '昨日データなし'}</div>
    </div>
    <div class="wssc">
      <div class="wssc-l">7日平均</div>
      <div class="wssc-v" style="color:var(--purp)">${avg7!==null ? avg7 : '--'}<span style="font-size:13px;color:var(--dim);font-weight:400">${avg7!==null?' kg':''}</span></div>
      <div class="wssc-s">${last7arr.length}日分のデータ</div>
    </div>
    <div class="wssc">
      <div class="wssc-l">目標まで</div>
      <div class="wssc-v" style="color:${gw&&todayW ? (todayW>gw?'var(--amber)':'var(--green)') : 'var(--muted)'}">${gw&&todayW ? Math.abs(+(todayW-gw).toFixed(1)) : '--'}<span style="font-size:13px;color:var(--dim);font-weight:400">${gw&&todayW?' kg':''}</span></div>
      <div class="wssc-s">${gw ? '目標: '+gw+' kg' : '未設定'}</div>
    </div>`;

  // ── trend comment ──
  const commentEl = document.getElementById('wsComment');
  if (recorded.length < 2) {
    commentEl.innerHTML = `<div class="ws-comment wc-none">💬 &nbsp;データを積み重ねることでトレンドが表示されます</div>`;
  } else {
    const half = Math.floor(recorded.length / 2);
    const firstHalf  = recorded.slice(0, half).map(d=>d.w);
    const secondHalf = recorded.slice(-half).map(d=>d.w);
    const avgFirst   = firstHalf.reduce((a,b)=>a+b,0)  / firstHalf.length;
    const avgSecond  = secondHalf.reduce((a,b)=>a+b,0) / secondHalf.length;
    const delta = +(avgSecond - avgFirst).toFixed(2);
    const period = wPeriod === 0 ? '全期間' : wPeriod + '日';
    let cls, icon, msg;
    if      (delta >=  0.5) { cls='wc-up';   icon='📈'; msg=`増量順調！ ${period}で +${delta} kg の増加トレンド`; }
    else if (delta >=  0.1) { cls='wc-up';   icon='📈'; msg=`増量傾向 (+${delta} kg)。このまま続けよう！`; }
    else if (delta <= -0.5) { cls='wc-down'; icon='📉'; msg=`減少傾向 (${delta} kg)。カロリーを見直そう`; }
    else if (delta <= -0.1) { cls='wc-down'; icon='📉'; msg=`やや減少傾向 (${delta} kg)。食事量を確認`; }
    else                    { cls='wc-flat'; icon='➡️'; msg=`停滞中 (${delta>=0?'+':''}${delta} kg)。食事や運動を見直すタイミング`; }
    commentEl.innerHTML = `<div class="ws-comment ${cls}">${icon} &nbsp;${msg}</div>`;
  }

  // ── 変化量セクション ──
  const fmtD = v => v===null ? '--' : (v>0?'+':'')+v+' kg';
  const dCol = v => v===null ? 'var(--dim)' : v>0.05 ? 'var(--amber)' : v<-0.05 ? 'var(--green)' : 'var(--dim)';
  const dIco = v => v===null ? '⚖️' : v>0.05 ? '📈' : v<-0.05 ? '📉' : '➡️';
  document.getElementById('wsDelta').innerHTML = `
    <div class="wc-delta">
      <div class="wcd">
        <div class="wcd-icon">${dIco(delta7)}</div>
        <div class="wcd-info">
          <div class="wcd-label">過去7日の変化</div>
          <div class="wcd-val" style="color:${dCol(delta7)}">${fmtD(delta7)}</div>
        </div>
      </div>
      <div class="wcd">
        <div class="wcd-icon">${dIco(delta30)}</div>
        <div class="wcd-info">
          <div class="wcd-label">過去30日の変化</div>
          <div class="wcd-val" style="color:${dCol(delta30)}">${fmtD(delta30)}</div>
        </div>
      </div>
    </div>`;

  // ── chart or empty ──
  const chartArea = document.getElementById('wsChartArea');
  if (!hasData) {
    if (wChart) { wChart.destroy(); wChart = null; }
    chartArea.innerHTML = `
      <div class="ws-empty">
        <span class="ws-empty-icon">⚖️</span>
        <div class="ws-empty-txt">体重を記録するとグラフが表示されます<br>
        <span style="font-size:12px;color:var(--muted)">毎日の記録が増量・減量の把握につながります</span></div>
      </div>`;
    return;
  }

  if (!document.getElementById('weightChart')) {
    chartArea.innerHTML = '<div class="chart-wrap"><canvas id="weightChart"></canvas></div>';
  }

  const labels   = days.map(d => d.label);
  const data     = days.map(d => d.w);

  // 7日移動平均ライン (各日の過去7日分の平均)
  const avg7Line = days.map((_, i) => {
    const slice = days.slice(Math.max(0, i-6), i+1).filter(d => d.w !== null);
    return slice.length >= 2 ? +(slice.reduce((a,b)=>a+b.w,0)/slice.length).toFixed(2) : null;
  });

  const ctx = document.getElementById('weightChart').getContext('2d');
  if (wChart) wChart.destroy();

  // グラデーション背景
  const grad = ctx.createLinearGradient(0, 0, 0, 240);
  grad.addColorStop(0, 'rgba(0,212,255,.22)');
  grad.addColorStop(1, 'rgba(0,212,255,0)');

  // ネオングロープラグイン (体重ラインとポイントに発光)
  const neonPlugin = {
    id: 'neon',
    beforeDatasetDraw(chart, args) {
      if (args.index !== 0) return;
      chart.ctx.save();
      chart.ctx.shadowColor = 'rgba(0,212,255,.85)';
      chart.ctx.shadowBlur  = 14;
    },
    afterDatasetDraw(chart, args) {
      if (args.index !== 0) return;
      chart.ctx.restore();
    }
  };

  const maxTicks = wPeriod === 7 ? 7 : wPeriod === 0 ? 8 : 10;

  wChart = new Chart(ctx, {
    type: 'line',
    plugins: [neonPlugin],
    data: {
      labels,
      datasets: [
        {
          label: '体重(kg)', data,
          borderColor: '#00d4ff',
          backgroundColor: grad,
          fill: true, tension: .4, spanGaps: true,
          pointRadius: days.map(d => d.w !== null ? 5 : 0),
          pointBackgroundColor: '#00d4ff',
          pointBorderColor: '#080d18',
          pointBorderWidth: 2,
          pointHoverRadius: 8,
          pointHoverBackgroundColor: '#ffffff',
          borderWidth: 2.5,
          order: 2,
        },
        {
          label: '7日平均', data: avg7Line,
          borderColor: 'rgba(167,139,250,.75)',
          backgroundColor: 'transparent',
          fill: false, tension: .4, spanGaps: true,
          pointRadius: 0,
          pointHoverRadius: 4,
          borderWidth: 1.5,
          borderDash: [5, 4],
          order: 1,
        }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      animation: { duration: 450 },
      plugins: {
        legend: {
          display: true,
          labels: {
            color: '#94a3b8', font: { size: 11 },
            usePointStyle: true, pointStyleWidth: 12, boxHeight: 6,
          }
        },
        tooltip: {
          backgroundColor: 'rgba(13,20,36,.92)',
          borderColor: 'rgba(0,212,255,.3)',
          borderWidth: 1,
          titleColor: '#94a3b8',
          bodyColor: '#e2e8f0',
          bodyFont: { weight: 'bold', size: 13 },
          callbacks: {
            label: c => {
              if (c.parsed.y == null) return null;
              if (c.datasetIndex === 0) return ` 体重: ${c.parsed.y} kg`;
              return ` 7日平均: ${c.parsed.y} kg`;
            }
          }
        }
      },
      scales: {
        y: {
          beginAtZero: false,
          ticks: { callback: v => v + ' kg', color: '#475569', font: { size: 11 } },
          grid:  { color: 'rgba(255,255,255,.04)' },
        },
        x: {
          ticks: { maxTicksLimit: maxTicks, color: '#475569', font: { size: 11 } },
          grid:  { color: 'rgba(255,255,255,.03)' },
        }
      }
    }
  });
}

function renderPast() {
  const recs=getRecs(), goals=getGoals();
  const dates=Object.keys(recs).sort().reverse();
  if (!dates.length){document.getElementById('pastRecs').innerHTML='<div class="empty"><div>記録がありません</div></div>';return;}
  document.getElementById('pastRecs').innerHTML=dates.slice(0,40).map(d=>{
    const r=recs[d], tot=totals(r.meals), sc=calcScore(r,goals), rk=getRank(sc);
    const isTd=d===todayStr();
    return `<div class="past-item" onclick="goDate('${d}')">
      <div class="past-date">${fmtDate(d)}${isTd?'<span class="tag-td">今日</span>':''}</div>
      <div class="past-sum">
        スコア: <b style="color:var(--cyan)">${sc}点 [${rk.r}]</b> ｜
        体重: ${r.weight!=null?r.weight+' kg':'未記録'} ｜
        ${Math.round(tot.calories)} kcal ｜ P: ${tot.protein.toFixed(1)}g ｜ 食事 ${(r.meals||[]).length}件
      </div>
    </div>`;
  }).join('');
}

  document.getElementById('setContent').innerHTML=`
    <div class="card" style="margin-top:10px">
      <div style="font-size:13px;font-weight:700;color:var(--dim);margin-bottom:14px">🎯 1日の目標値</div>
      <div class="fg"><label class="fl">目標カロリー (kcal)</label><input type="number" id="gCal" class="fi" value="${g.calories}"></div>
      <div class="frow">
        <div class="fg"><label class="fl">たんぱく質 (g)</label><input type="number" id="gPro" class="fi" value="${g.protein}"></div>
        <div class="fg"><label class="fl">脂質 (g)</label><input type="number" id="gFat" class="fi" value="${g.fat}"></div>
      </div>
      <div class="fg"><label class="fl">炭水化物 (g)</label><input type="number" id="gCarb" class="fi" value="${g.carbs}"></div>
      <button class="btn btn-p btn-bl" onclick="saveGoals()">目標を保存</button>
    </div>
    <div class="card" style="margin-top:10px">
      <div style="font-size:13px;font-weight:700;color:var(--dim);margin-bottom:14px">⭐ テンプレート</div>
      ${t.map(x=>`
        <div class="meal-item">
          <div class="mh">
            <div><span class="mcat ${catcls[x.category]}">${catLabel(x.category)}</span><div class="mn">${esc(x.name)}</div></div>
            <div class="mact">
              <button class="btn btn-s" onclick="quickAdd('${x.id}')">今日に追加</button>
              <button class="btn btn-d" onclick="delTmpl('${x.id}')">削除</button>
            </div>
          </div>
          <div class="mnums"><span>🔥${Math.round(x.calories)}kcal</span><span>P:${(+x.protein).toFixed(1)}g</span><span>F:${(+x.fat).toFixed(1)}g</span><span>C:${(+x.carbs).toFixed(1)}g</span></div>
        </div>`).join('')||'<div class="empty" style="padding:16px"><div>テンプレートがありません</div></div>'}
      <div class="divider"></div>
      <div class="fg"><label class="fl">食品名</label><input type="text" id="tName" class="fi" placeholder="例：ザバスプロテイン"></div>
      <div class="fg"><label class="fl">食事区分</label>
        <select id="tCat" class="fi">
          <option value="breakfast">朝食</option><option value="lunch">昼食</option>
          <option value="dinner">夕食</option><option value="snack">間食</option>
        </select>
      </div>
      <div class="frow frow4">
        <div class="fg"><label class="fl">カロリー</label><input type="number" id="tCal" class="fi" placeholder="110"></div>
        <div class="fg"><label class="fl">たんぱく質</label><input type="number" id="tPro" class="fi" placeholder="20"></div>
        <div class="fg"><label class="fl">脂質</label><input type="number" id="tFat" class="fi" placeholder="2"></div>
        <div class="fg"><label class="fl">炭水化物</label><input type="number" id="tCarb" class="fi" placeholder="5"></div>
      </div>
      <button class="btn btn-p btn-bl" onclick="addTemplate()">テンプレートを保存</button>
    </div>`;
}

// ════════════════════════════════════════════════
// COLLAPSIBLE
// ════════════════════════════════════════════════
function toggleColl(collId, chevId, _ignored, renderFn) {
  const el=document.getElementById(collId);
  const hidden=el.classList.toggle('hidden');
  document.getElementById(chevId).textContent=hidden?'▼':'▲';
  if (!hidden) renderFn();
}

// ════════════════════════════════════════════════
// DATE NAV
// ════════════════════════════════════════════════
function changeDate(delta) {
  const d=new Date(curDate+'T00:00:00'); d.setDate(d.getDate()+delta);
  curDate=d.toISOString().split('T')[0];
  document.getElementById('currentDate').value=curDate;
  renderPage();
}
function onDateChange() { curDate=document.getElementById('currentDate').value; renderPage(); }
function goToToday() { curDate=todayStr(); document.getElementById('currentDate').value=curDate; renderPage(); }
function goDate(d) { curDate=d; document.getElementById('currentDate').value=d; window.scrollTo({top:0,behavior:'smooth'}); renderPage(); }

// ════════════════════════════════════════════════
// FULL PAGE RENDER
// ════════════════════════════════════════════════
function renderPage() {
  renderHeader();
  updateWeightCard();
  renderStats();
  renderGauges();
  renderMissions();
  renderQuick();
  renderMeals();
  renderBadges();
  renderStatus();
  renderWeightSection();
}

// ════════════════════════════════════════════════
// PARTIAL RE-RENDER (after data change)
// ════════════════════════════════════════════════
function refresh() {
  renderHeader();
  updateWeightCard();
  renderStats();
  renderGauges();
  renderMissions();
  renderMeals();
  renderBadges();
  renderStatus();
}

// ════════════════════════════════════════════════
// WEIGHT
// ════════════════════════════════════════════════
function saveWeight() {
  const v=parseFloat(document.getElementById('weightInput').value);
  const prevXP=computeXP();
  const rec=getRec(curDate);
  rec.weight=isNaN(v)?null:v;
  saveRec(curDate,rec);
  refresh();
  renderWeightSection();
  runGameChecks(prevXP);
}

// ════════════════════════════════════════════════
// MEAL CRUD
// ════════════════════════════════════════════════
function addMeal() {
  const name=document.getElementById('mealName').value.trim();
  if (!name){showToast('⚠️ 食品名を入力してください');return;}
  const prevXP=computeXP();
  const meal={
    id:genId(),
    category:document.getElementById('mealCategory').value,
    name,
    calories:parseFloat(document.getElementById('mealCalories').value)||0,
    protein: parseFloat(document.getElementById('mealProtein').value) ||0,
    fat:     parseFloat(document.getElementById('mealFat').value)     ||0,
    carbs:   parseFloat(document.getElementById('mealCarbs').value)   ||0,
  };
  const rec=getRec(curDate); rec.meals=rec.meals||[]; rec.meals.push(meal);
  saveRec(curDate,rec);
  ['mealName','mealCalories','mealProtein','mealFat','mealCarbs'].forEach(id=>document.getElementById(id).value='');
  floatXP(10); showToast('✅ 追加！ +10 XP');
  refresh();
  runGameChecks(prevXP);
}

function quickAdd(id) {
  const t=getTmpl().find(x=>x.id===id); if(!t)return;
  const prevXP=computeXP();
  const rec=getRec(curDate); rec.meals=rec.meals||[];
  rec.meals.push({id:genId(),category:t.category,name:t.name,calories:t.calories,protein:t.protein,fat:t.fat,carbs:t.carbs});
  saveRec(curDate,rec);
  floatXP(10); showToast(`✅ 「${t.name}」追加！ +10 XP`);
  refresh();
  runGameChecks(prevXP);
}

function delMeal(id) {
  if (!confirm('この食事を削除しますか？'))return;
  const rec=getRec(curDate); rec.meals=(rec.meals||[]).filter(m=>m.id!==id);
  saveRec(curDate,rec); showToast('🗑️ 削除しました');
  refresh();
}

// ════════════════════════════════════════════════
// EDIT MODAL
// ════════════════════════════════════════════════
function openEdit(id) {
  const m=(getRec(curDate).meals||[]).find(x=>x.id===id); if(!m)return;
  ['editId','editName'].forEach(k=>{document.getElementById(k).value=k==='editId'?id:m.name});
  document.getElementById('editCategory').value=m.category;
  document.getElementById('editCalories').value=m.calories;
  document.getElementById('editProtein').value=m.protein;
  document.getElementById('editFat').value=m.fat;
  document.getElementById('editCarbs').value=m.carbs;
  document.getElementById('editModal').classList.add('show');
}
function saveEdit() {
  const id=document.getElementById('editId').value;
  const rec=getRec(curDate); const idx=(rec.meals||[]).findIndex(m=>m.id===id); if(idx<0)return;
  const prevXP=computeXP();
  rec.meals[idx]={...rec.meals[idx],
    category:document.getElementById('editCategory').value,
    name:document.getElementById('editName').value.trim(),
    calories:parseFloat(document.getElementById('editCalories').value)||0,
    protein: parseFloat(document.getElementById('editProtein').value) ||0,
    fat:     parseFloat(document.getElementById('editFat').value)     ||0,
    carbs:   parseFloat(document.getElementById('editCarbs').value)   ||0,
  };
  saveRec(curDate,rec); closeModal('editModal'); showToast('✅ 更新しました！');
  refresh(); runGameChecks(prevXP);
}
function closeModal(id){document.getElementById(id).classList.remove('show')}
document.getElementById('editModal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal('editModal')});
document.getElementById('rewardModal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeRew()});

// ════════════════════════════════════════════════
// GOALS & TEMPLATES
// ════════════════════════════════════════════════
function saveGoals() {
  const g={
    calories:parseFloat(document.getElementById('gCal').value)||2500,
    protein: parseFloat(document.getElementById('gPro').value)||160,
    fat:     parseFloat(document.getElementById('gFat').value)||70,
    carbs:   parseFloat(document.getElementById('gCarb').value)||300,
  };
  localStorage.setItem(K.GOALS,JSON.stringify(g));
  showToast('✅ 目標を保存しました！'); renderPage();
}
function addTemplate() {
  const name=document.getElementById('tName').value.trim();
  if (!name){showToast('⚠️ 食品名を入力してください');return;}
  const t=getTmpl();
  t.push({id:genId(),name,category:document.getElementById('tCat').value,
    calories:parseFloat(document.getElementById('tCal').value)||0,
    protein: parseFloat(document.getElementById('tPro').value)||0,
    fat:     parseFloat(document.getElementById('tFat').value)||0,
    carbs:   parseFloat(document.getElementById('tCarb').value)||0,
  });
  saveTmpl(t);
  showToast('✅ テンプレートを保存！');
  renderSettings(); renderQuick();
}
function delTmpl(id) {
  if (!confirm('削除しますか？'))return;
  saveTmpl(getTmpl().filter(t=>t.id!==id));
  showToast('🗑️ 削除しました'); renderSettings(); renderQuick();
}

// ════════════════════════════════════════════════
// REWARD SYSTEM
// ════════════════════════════════════════════════
function runGameChecks(prevXP) {
  const newXP=computeXP();
  const prevLv=xpInfo(prevXP).level, newLv=xpInfo(newXP).level;
  const newBadges=checkBadges();
  rewQ=[];
  newBadges.forEach(id=>{
    const def=BADGE_DEFS.find(b=>b.id===id);
    if(def) rewQ.push(()=>showRew('badge',def));
  });
  if (newLv>prevLv) rewQ.push(()=>showRew('lv',{level:newLv}));
  if (rewQ.length){const fn=rewQ.shift();fn();}
}

function showRew(type,data) {
  let html='';
  if (type==='badge') {
    html=`<span class="rew-icon">${data.e}</span>
      <div class="rew-title" style="color:var(--amber)">バッジ獲得！</div>
      <div class="rew-sub"><b>「${data.n}」</b>を獲得した！<br>${data.c}</div>
      <button class="rew-btn" onclick="closeRew()">いえーい！🎉</button>`;
  } else {
    const msgs={2:'記録を続けよう！',3:'いい調子！',5:'継続の達人！',10:'伝説のランナー！'};
    const m=msgs[data.level]||`レベル${data.level}の実力者！`;
    html=`<span class="rew-icon">🎉</span>
      <div class="rew-title" style="color:var(--cyan)">LEVEL UP!</div>
      <div class="rew-sub">Lv.${data.level} に到達！<br>${m}</div>
      <button class="rew-btn" onclick="closeRew()">やった！</button>`;
  }
  document.getElementById('rewBody').innerHTML=html;
  document.getElementById('rewardModal').classList.add('show');
}
function closeRew() {
  closeModal('rewardModal');
  if (rewQ.length){const fn=rewQ.shift();fn();}
}

// ════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════
function init() {
  insertDummy();
  document.getElementById('currentDate').value=curDate;
  renderPage();
}
init();
</script>
